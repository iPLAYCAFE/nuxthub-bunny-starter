# ──────────────────────────────────────────────────────────
# Deploy to bunny.net Magic Containers
#
# Environment Naming Convention:
#   main   → tag: latest → nuxthub-b       (production)
#   stg    → tag: stg    → nuxthub-b-stg   (staging)
#   PR     → tag: prev   → nuxthub-b-prev  (preview)
#
# Triggers:
#   • Push to main  (after CI passes) → production deploy
#   • Push to stg   (after CI passes) → staging deploy
#   • Manual dispatch                 → choose environment
#
# Required GitHub secrets (per environment):
#   BUNNYNET_API_KEY     — bunny.net API key
#   LIBSQL_URL           — Bunny Database URL (*.lite.bunnydb.net)
#   LIBSQL_AUTH_TOKEN    — Bunny Database auth token
#   S3_ACCESS_KEY_ID     — Bunny Storage S3 access key
#   S3_SECRET_ACCESS_KEY — Bunny Storage S3 secret key
#   S3_BUCKET            — Bunny Storage S3 bucket name
#   S3_REGION            — Bunny Storage S3 region (e.g. sg)
#   S3_ENDPOINT          — Bunny Storage S3 endpoint URL
#
# Required GitHub variables (per environment):
#   BUNNY_APP_ID         — Magic Container application ID
#   BUNNY_CONTAINER_NAME — Container name within the app
#
# Docs:
#   https://docs.bunny.net/magic-containers/deploy-with-github-actions
#   https://hub.nuxt.com/docs/getting-started/environments
# ──────────────────────────────────────────────────────────

name: Deploy to Magic Containers

on:
  workflow_run:
    workflows: [CI]
    branches: [main, stg]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - preview

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build → Migrate → Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    # ── Resolve environment from branch or manual input ──
    # Note: workflow_run sets github.ref to default branch, NOT the triggering branch.
    # Use github.event.workflow_run.head_branch to get the actual source branch.
    environment: >-
      ${{
        github.event_name == 'workflow_dispatch'
          && github.event.inputs.environment
          || (github.event.workflow_run.head_branch == 'stg' && 'staging')
          || 'production'
      }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Set environment-specific vars ────────────────────
      - name: Set image tag
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.event.workflow_run.head_branch }}" = "stg" ]; then
            ENV="staging"
          else
            ENV="production"
          fi
          case "$ENV" in
            production) echo "tag=latest" >> "$GITHUB_OUTPUT" ;;
            staging)    echo "tag=stg"    >> "$GITHUB_OUTPUT" ;;
            preview)    echo "tag=prev"   >> "$GITHUB_OUTPUT" ;;
          esac

      # ── Build Docker image ─────────────────────────────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=${{ steps.env.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
            S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
            S3_BUCKET=${{ vars.S3_BUCKET }}
            S3_REGION=${{ vars.S3_REGION }}
            S3_ENDPOINT=${{ vars.S3_ENDPOINT }}

      # ── Database Migrations (after build, before deploy) ─
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run database migrations
        run: npx nuxt db migrate
        env:
          NODE_ENV: production
          LIBSQL_URL: ${{ secrets.LIBSQL_URL }}
          LIBSQL_AUTH_TOKEN: ${{ secrets.LIBSQL_AUTH_TOKEN }}

      # ── Deploy to Magic Containers ─────────────────────
      - name: Update container image on Magic Containers
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ vars.BUNNY_APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: ${{ vars.BUNNY_CONTAINER_NAME }}
          image_tag: "sha-${{ github.sha }}"
